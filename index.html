<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">   
    <title>Document</title>
</head>

<body>
    <header>
        <nav class="navBar">

            <span><h4>E-commerce website</h1></span>

            <div class="nav-links">
             <a href="#home">Home</a>
             <a href="#product-div">Shop</a>
             <a href="#home">Blog</a>
            </div>

            <div class="nav-icon">
                <i class="fa-solid fa-magnifying-glass"></i>
                <i id="cartIcon" class="fa-solid fa-cart-arrow-down"></i>
                <i class="fa-solid fa-circle-user"></i>
            </div>
           
            
        </nav>
    </header>

 <div id="main-container">

    <div id="cart-container">

        <div class="cart-header">            
            <div>Product</div>
            <div>Price</div>
            <div>Quantity</div>
            <div>Subtotal</div>
        </div>

        <div id="cartDetials">
            <div id="cart-items"></div>
            <div id="cart-total"></div>
            <div id="cartBtn">
            <button id="clearCart-Btn" onclick="clearCart()">Clear Cart</button>
            <button class="buyNow-btn" onclick="buyNow()">Buy Now</button>
            </div>
        </div>

    </div>

    <div id="product-div">

    </div>

 </div>   
    <script src="script.js"></script>
</body>
</html>
